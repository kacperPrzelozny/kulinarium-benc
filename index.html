<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kulinarium">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Kulinarium - Przewodnik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <header class="p-3 bg-white border-bottom shadow-sm sticky-top">
        <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
            <h1 class="h3 m-0 text-primary fw-bold"><i class="bi bi-egg-fried"></i> Kulinarium</h1>
            
            <div class="d-flex gap-2 flex-grow-1 flex-sm-grow-0 align-items-center">
                <div class="input-group input-group-sm">
                    <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
                    <input type="text" id="search-input" class="form-control border-0 bg-light" placeholder="Szukaj dania...">
                </div>
                
                <button id="add-btn" class="btn btn-primary rounded-pill px-3 fw-bold btn-sm shadow-sm">
                    <i class="bi bi-plus-lg"></i>
                </button>

                <div class="dropdown">
                    <button class="btn btn-outline-secondary btn-sm rounded-circle border-0" type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-three-dots-vertical"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-3">
                        <li><a class="dropdown-item py-2" href="#" onclick="exportData()"><i class="bi bi-download me-2 text-success"></i>Eksportuj kopię JSON</a></li>
                        <li><a class="dropdown-item py-2" href="#" onclick="document.getElementById('import-input').click()"><i class="bi bi-upload me-2 text-primary"></i>Importuj dane</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item py-2 text-muted small" href="#">Wersja 1.0.6</a></li>
                    </ul>
                </div>
                <input type="file" id="import-input" class="d-none" accept=".json">
            </div>
        </div>
    </header>
    
    <main id="cards-container" class="container mt-4 mb-5 row g-4 mx-auto flex-grow-1">
        </main>

    <footer class="text-center py-4 mt-auto text-muted small">
        <p>© 2026 Kulinarium PWA • Twoje smaczne wspomnienia</p>
    </footer>

    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <div id="modal" class="modal fade" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" style="max-width: 500px;">
            <div class="modal-content shadow-lg border-0 rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 id="modal-title" class="modal-title fw-bold text-primary">Nowe Danie</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Zamknij"></button>
                </div>
                <div class="modal-body">
                    <form id="dish-form">
                        <input type="hidden" id="entry-id">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase">Nazwa dania</label>
                            <input type="text" id="name" class="form-control bg-light border-0 py-2" placeholder="Co zjadłeś?" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase">Restauracja</label>
                            <input type="text" id="restaurant" class="form-control bg-light border-0 py-2" placeholder="Gdzie to było?" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase">Zdjęcie</label>
                            <input type="file" id="photo" class="form-control bg-light border-0" accept="image/*" capture="environment">
                            <img id="photo-preview" class="d-none img-fluid mt-3 rounded-4 shadow-sm w-100" alt="Podgląd">
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label small fw-bold text-uppercase">Cena (zł)</label>
                                <input type="number" step="0.01" id="price" class="form-control bg-light border-0 py-2" required>
                            </div>
                            <div class="col">
                                <label class="form-label small fw-bold text-uppercase">Ocena (1-10)</label>
                                <input type="number" min="1" max="10" id="rating" class="form-control bg-light border-0 py-2" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase">Twoja opinia</label>
                            <textarea id="description" class="form-control bg-light border-0" rows="3" placeholder="Opisz swoje wrażenia smakowe..."></textarea>
                        </div>
                        <div class="geo-section mt-4 p-3 bg-light border-0 rounded-4 text-center">
                            <button type="button" id="geo-btn" class="btn btn-white btn-sm mb-2 shadow-sm fw-bold border">
                                <i class="bi bi-geo-alt text-danger"></i> Dodaj lokalizację GPS
                            </button>
                            <div id="geo-status" class="x-small text-muted fw-bold">Współrzędne ułatwią Ci powrót do tego miejsca.</div>
                            <input type="hidden" id="lat">
                            <input type="hidden" id="lng">
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Anuluj</button>
                    <button type="submit" form="dish-form" class="btn btn-primary rounded-pill px-4 fw-bold">Zapisz Danie</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js" defer></script>
</body>
</html>
