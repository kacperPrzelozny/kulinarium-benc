<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kulinarium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6b6b">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <main id="cards-container">
        </main>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2 id="modal-title">Nowe Danie</h2>
            
            <form id="dish-form">
                <input type="hidden" id="entry-id">
                
                <label>Nazwa dania:</label>
                <input type="text" id="name" required>

                <label>Restauracja:</label>
                <input type="text" id="restaurant" required>

                <label>Zdjęcie (Aparat / Galeria):</label>
                <input type="file" id="photo" accept="image/*" capture="environment">
                <img id="photo-preview" class="hidden" alt="Podgląd">

                <div class="row">
                    <div class="col">
                        <label>Cena (PLN):</label>
                        <input type="number" step="0.01" id="price" required>
                    </div>
                    <div class="col">
                        <label>Ocena (1-10):</label>
                        <input type="number" min="1" max="10" id="rating" required>
                    </div>
                </div>

                <label>Opis / Notatki:</label>
                <textarea id="description" rows="3"></textarea>

                <div class="geo-section">
                    <button type="button" id="geo-btn" class="secondary-btn">📍 Pobierz moją lokalizację</button>
                    <small id="geo-status">Brak lokalizacji</small>
                    <input type="hidden" id="lat">
                    <input type="hidden" id="lng">
                </div>

                <button type="submit" class="primary-btn full-width">Zapisz w Kulinarium</button>
            </form>
        </div>
    </div>
</body>
</html>
