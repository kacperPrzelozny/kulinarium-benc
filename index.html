<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kulinarium - Przewodnik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js" defer></script>
</head>
<body class="bg-light">

    <header class="d-flex justify-content-between align-items-center p-3 bg-white border-bottom shadow-sm sticky-top">
        <h1 class="h3 m-0 text-primary fw-bold"><i class="bi bi-egg-fried"></i> Kulinarium</h1>
        <button id="add-btn" class="btn btn-primary rounded-pill px-4 fw-bold">
            <i class="bi bi-plus-lg"></i> Dodaj Danie
        </button>
    </header>
    
    <main id="cards-container" class="container mt-4 mb-5 row g-4 mx-auto">
        </main>

    <div id="modal" class="modal fade" tabindex="-1" aria-labelledby="modal-title" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable" style="max-width: 500px;">
            <div class="modal-content shadow-lg border-0">
                
                <div class="modal-header bg-primary text-white">
                    <h5 id="modal-title" class="modal-title fw-bold">Nowe Danie</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Zamknij"></button>
                </div>
                
                <div class="modal-body">
                    <form id="dish-form">
                        <input type="hidden" id="entry-id">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nazwa dania:</label>
                            <input type="text" id="name" class="form-control" placeholder="np. Pad Thai" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Restauracja:</label>
                            <input type="text" id="restaurant" class="form-control" placeholder="np. Tuk Tuk" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Zdjęcie (Aparat / Galeria):</label>
                            <input type="file" id="photo" class="form-control" accept="image/*" capture="environment">
                            <img id="photo-preview" class="d-none img-fluid mt-3 rounded shadow-sm w-100" style="max-height: 200px; object-fit: cover;" alt="Podgląd">
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label fw-bold">Cena (PLN):</label>
                                <input type="number" step="0.01" id="price" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label fw-bold">Ocena (1-10):</label>
                                <input type="number" min="1" max="10" id="rating" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Opis / Notatki:</label>
                            <textarea id="description" class="form-control" rows="3" placeholder="Co Ci najbardziej smakowało?"></textarea>
                        </div>

                        <div class="geo-section mt-4 p-3 bg-light border rounded text-center">
                            <button type="button" id="geo-btn" class="btn btn-outline-secondary btn-sm mb-2">
                                <i class="bi bi-geo-alt"></i> Pobierz moją lokalizację
                            </button>
                            <div id="geo-status" class="small text-muted fw-bold">Brak lokalizacji</div>
                            <input type="hidden" id="lat">
                            <input type="hidden" id="lng">
                        </div>
                    </form>
                </div>
                
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Anuluj</button>
                    <button type="submit" form="dish-form" class="btn btn-primary px-4">Zapisz w Kulinarium</button>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
